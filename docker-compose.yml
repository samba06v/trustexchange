version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: trustexchange-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: trustexchange

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trustexchange-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/trustexchange
      - PORT=5000
    depends_on:
      - mongodb
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trustexchange-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
